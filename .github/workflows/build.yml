name: Build & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build and sign Tauri app
        uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: latest
          releaseName: 'Paddyngton Latest'
          releaseBody: 'Auto-built from push to main branch.'
          releaseDraft: false
          prerelease: false

      - name: Create latest.json
        run: |
          $runNum = $env:GITHUB_RUN_NUMBER
          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          $version = "0.1.$runNum"
          $exeUrl = "https://github.com/dontneedfriends-jpg/paddyngton/releases/download/latest/Paddyngton_${version}_x64-setup.exe"
          $json = @{
            version = $version
            notes = "Build #$runNum - $shortSha"
            pubkey = "dW50cnVzdGVkIGNvbW1lbnQ6IG1pbmlzaWduIHB1YmxpYyBrZXk6IDk5NDIyMEU1NDIyQjNCMjQKUldRa095dEM1U0JDbWFVRzhqOHBqUVNGd1N5bXRkZjNPK1l3bkpXbzFHMjlzQ1Y3cXd0OER5U3oK"
            url = $exeUrl
            signature = ""
          } | ConvertTo-Json -Depth 3
          $json | Out-File -FilePath latest.json -Encoding UTF8
        shell: pwsh

      - name: Upload latest.json
        run: gh release upload latest latest.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash