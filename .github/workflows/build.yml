name: Build & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build and sign Tauri app
        uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: latest
          releaseName: 'Paddyngton Latest'
          releaseBody: 'Auto-built from push to main branch.'
          releaseDraft: false
          prerelease: false

      - name: Create latest.json
        run: |
          $json = @{
            version = "0.1.0"
            notes = "Auto-built from push to main branch."
            pubkey = "dW50cnVzdGVkIGNvbW1lbnQ6IG1pbmlzaWduIHB1YmxpYyBrZXk6IDk5NDIyMEU1NDIyQjNCMjQKUldRa095dEM1U0JDbWFVRzhqOHBqUVNGd1N5bXRkZjNPK1l3bkpXbzFHMjlzQ1Y3cXd0OER5U3oK"
            url = "https://github.com/dontneedfriends-jpg/paddyngton/releases/download/latest/Paddyngton_0.1.0_x64-setup.exe"
            signature = ""
          } | ConvertTo-Json -Depth 3
          $json | Out-File -FilePath latest.json -Encoding UTF8
        shell: pwsh

      - name: Get Release Upload URL
        id: release
        run: |
          $token = "${{ secrets.GITHUB_TOKEN }}"
          $headers = @{Authorization = "Bearer $token"}
          $rel = Invoke-RestMethod -Uri "https://api.github.com/repos/dontneedfriends-jpg/paddyngton/releases/tags/latest" -Headers $headers
          $uploadUrl = $rel.upload_url -replace "\{.+", ""
          "UPLOAD_URL=$uploadUrl" | Out-File -FilePath $env:GITHUB_ENV -Encoding UTF8 -Append
        shell: pwsh

      - name: Upload latest.json
        run: |
          $token = "${{ secrets.GITHUB_TOKEN }}"
          $json = Get-Content latest.json -Raw -Encoding UTF8
          $headers = @{
            Authorization = "Bearer $token"
            Content-Type = "application/json"
          }
          $uri = "${{ env.UPLOAD_URL }}?name=latest.json"
          Invoke-RestMethod -Method POST -Uri $uri -Headers $headers -Body $json | Out-Null
        shell: pwsh