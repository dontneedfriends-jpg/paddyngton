name: Build & Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            arch: 'aarch64'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            arch: 'x86_64'
            target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            arch: 'x86_64'
            target: 'x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            arch: 'x86_64'
            target: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.sha }}
          releaseName: 'Paddyngton ${{ github.sha }}'
          releaseBody: 'Auto-built from commit ${{ github.sha }}'
          releaseDraft: true
          prerelease: false

  build-nsis:
    needs: build-and-release
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build NSIS installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.sha }}-nsis
          releaseName: 'Paddyngton ${{ github.sha }} (NSIS)'
          releaseBody: 'Windows NSIS installer.'
          releaseDraft: true
          prerelease: false
          bundleFormat: 'nsis'